name: CPU credit watch

# Billing leak detector — the cost sibling of health-watch.yml. From late May
# to 2026-07-12 an unidentified runaway process pinned ~1 vCPU 24/7 on the
# neemba EC2 (t3 unlimited mode), silently charging ~1,350 surplus credits
# (≈$1.1) per DAY for weeks. Nothing paged because billing pain is invisible
# in service health. This watch reads CPUSurplusCreditsCharged daily and
# alerts Discord (plus the GitHub failure email floor) when the instance is
# burning money above its baseline again.
# NOTE: scheduled workflows only run from the default branch (main), so this
# takes effect after the next release PR.

on:
  schedule:
    - cron: "0 21 * * *" # 06:00 KST daily
  workflow_dispatch: # manual run for testing

env:
  # neemba prod EC2 (t3.medium, EIP 13.125.26.93)
  INSTANCE_ID: i-067ebdc3337b14ff9
  # 60 credits = 1 vCPU-hour (~$0.05): one legit burst rides on accrued
  # balance and charges nothing, so anything clearly above rounding noise
  # means sustained burn. The 7/12 leak charged ~1,350/day.
  THRESHOLD: "60"

jobs:
  check-credits:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Check surplus CPU credits (last 24h)
        run: |
          set -euo pipefail
          START=$(date -u -d '24 hours ago' +%Y-%m-%dT%H:%M:%SZ)
          END=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          SUM=$(aws cloudwatch get-metric-statistics \
            --namespace AWS/EC2 --metric-name CPUSurplusCreditsCharged \
            --dimensions Name=InstanceId,Value="$INSTANCE_ID" \
            --start-time "$START" --end-time "$END" \
            --period 86400 --statistics Sum \
            --query "sum(Datapoints[].Sum || [\`0\`])" --output text)
          # No datapoints (idle instance) comes back as None/empty → treat as 0.
          case "$SUM" in ""|None|null) SUM=0 ;; esac
          echo "surplus credits charged in last 24h: $SUM (threshold $THRESHOLD)"
          echo "SURPLUS=$SUM" >> "$GITHUB_ENV"
          awk -v s="$SUM" -v t="$THRESHOLD" 'BEGIN { exit (s > t) ? 1 : 0 }'

      - name: Notify Discord on failure
        if: failure()
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          set -euo pipefail
          if [ -z "$WEBHOOK_URL" ]; then
            echo "::warning::DISCORD_WEBHOOK_URL secret is not set — Discord alert skipped (GitHub failure email still goes out)"
            exit 0
          fi
          jq -n --arg content "💸 neemba EC2 CPU 크레딧 누수 감지 — 최근 24h 잉여 크레딧 ${SURPLUS:-?} (임계 $THRESHOLD). 서버에서 CPU 잡아먹는 프로세스 확인 필요 (docker stats). Run: $RUN_URL" \
            '{content: $content}' \
            | curl -fsS -m 10 -H "Content-Type: application/json" -d @- "$WEBHOOK_URL"
