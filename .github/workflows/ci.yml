name: CI

# Fast feedback on every PR and on develop pushes. This does NOT gate deploy
# (deploy.yml has its own `test` job); it surfaces failures during development.
on:
  pull_request:
    branches:
      - develop
      - main
  push:
    branches:
      - develop

jobs:
  node-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/node
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/node/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Test
        run: npm test

      - name: Type check
        run: npx tsc --noEmit

  python-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/python
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: ${{ runner.os }}-uv-${{ hashFiles('services/python/uv.lock') }}
          restore-keys: |
            ${{ runner.os }}-uv-

      - name: Test
        run: uv run --extra dev pytest tests/ -q
