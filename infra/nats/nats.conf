port: 4222
http: 8222

jetstream: {
    store_dir: "/data/jetstream"
    max_mem_store: 512Mi
    max_file_store: 10Gi
}

max_payload: 4194304
max_connections: 10000
ping_interval: "2m"
write_deadline: "5s"

# Credentials come from the container environment (.env.prod / .env.dev via
# compose env_file) — never hardcode them here: this file is committed, and
# the previously hardcoded passwords are considered leaked (rotated out).
authorization {
  users: [
    {
      user: $NATS_ADMIN_USER
      password: $NATS_ADMIN_PASSWORD
      permissions {
        publish: { allow: [">"] }
        subscribe: { allow: [">"] }
      }
    },
    {
      user: $NATS_USER
      password: $NATS_PASSWORD
      permissions {
        publish: {
          allow: [
            "neemba.>",
            "transcript.>",
            "_INBOX.>",
            "$JS.API.>",
            "$JS.ACK.>"
            ]
        }
        subscribe: {
          allow: [
            "neemba.>",
            "transcript.>",
            "_INBOX.>",
            "$JS.>"
            ]
        }
      } 
    }
  ]
}