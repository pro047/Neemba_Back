# MUST stay 1: nginx-rtmp keeps each stream inside the worker that accepted
# the publisher. With multiple workers a subscriber (node's ffmpeg pull) that
# lands on any other worker receives NOTHING, forever — the pull then stalls
# 10s, restarts, and retries until it happens to hit the right worker (the
# 10~20s session-start delay, §4-2). rtmp_auto_push is the multi-worker fix
# but proved unreliable in local verification; one worker is plenty for the
# single-stream workload and removes the lottery entirely.
worker_processes 1;
events { worker_connections 1024; }

rtmp {
    server {
        listen 1935;
        chunk_size 4096;

        application live {
            live on;
            record off;
            # Publisher (OBS) gate: node validates the stream-key arg
            # (`translation?key=...`). Allows everything while
            # RTMP_PUBLISH_KEY is unset on node (two-phase rollout).
            # Play (node's internal ffmpeg pull) is NOT gated.
            on_publish http://node:3000/api/rtmp/on-publish;
        }
    }
}