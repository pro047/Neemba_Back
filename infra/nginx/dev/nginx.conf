worker_processes 1;
events { worker_connections 1024; }

http {
    # Correct Content-Type for the monitor static assets (css/js). Without this
    # .css is served as text/plain and browsers refuse the stylesheet.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    error_log /var/log/nginx/error.log info;
    access_log /var/log/nginx/access.log combined;

    sendfile off;
    tcp_nopush off;
    tcp_nodelay off;

    gzip off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream node { server node:3000; }
    upstream python { server python:8000; }

    server {
        listen 80;
        server_name _;

        location /api/mic {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://node;
            proxy_read_timeout 3600s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_buffering off;
        }

        # Monitor history/search API → python (Phase 6).
        # /api/ proxies to node; the monitor API lives in python:8000. This
        # more-specific prefix is matched ahead of /api/ by nginx.
        location /api/monitor/ {
            # Access control (Phase 7) — htpasswd from mounted secrets dir.
            auth_basic           "Neemba Monitor";
            auth_basic_user_file /var/lib/neemba/secrets/monitor.htpasswd;

            proxy_pass http://python;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s; proxy_send_timeout 60s; proxy_read_timeout 30s;
            client_max_body_size 20m;
        }

        location /api/ {
            proxy_pass http://node;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s; proxy_send_timeout 60s; proxy_read_timeout 30s;
            client_max_body_size 20m;
        }


        # Monitor live WebSocket → python (Phase 7 access control). More-specific
        # prefix than /ws so it matches first; the client /ws below stays open.
        location /ws/monitor {
            auth_basic           "Neemba Monitor";
            auth_basic_user_file /var/lib/neemba/secrets/monitor.htpasswd;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://python;
            proxy_read_timeout 3600s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_buffering off;
        }

        location /ws {
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_pass http://python;
            proxy_read_timeout 3600s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_buffering off;
        }

        location /health {
            default_type text/plain;
            return 200 "ok\n";
        }

        # Monitor static page (Phase 6) — fall back to index.html so the
        # vanilla SPA renders even on a deep link.
        location /monitor {
            # Access control (Phase 7). Loading the page sets the Basic Auth
            # credential the browser then reuses for the monitor WS handshake.
            auth_basic           "Neemba Monitor";
            auth_basic_user_file /var/lib/neemba/secrets/monitor.htpasswd;

            root /var/www/html;
            try_files $uri $uri/ /monitor/index.html;
        }

        location / {
            root /var/www/html;
            try_files $uri $uri/ =404;
        }
    }
}
