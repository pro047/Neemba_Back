worker_processes 1;
events { worker_connections 1024; }

http {
    # Correct Content-Type for the monitor static assets (css/js). Without this
    # .css is served as text/plain and browsers refuse the stylesheet.
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    resolver 127.0.0.11 valid=10s ipv6=off;
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream node {
        server node:3000;
    }

    upstream python {
        server python:8000;
    }

    # HTTP → HTTPS (ACME only on HTTP)
    server {
        listen 80;
        server_name neemba.app www.neemba.app;

        location /.well-known/acme-challenge/ {
            root /var/www/html;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS
    server {
        listen 443 ssl;
        server_name neemba.app www.neemba.app;

        ssl_certificate     /etc/letsencrypt/live/neemba.app/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/neemba.app/privkey.pem;

        client_max_body_size 20m;

        # Monitor history/search API → python (Phase 6).
        # NOTE: /api/ proxies to node; the monitor API lives in python:8000.
        # This is a more-specific prefix than /api/ so nginx matches it first.
        location /api/monitor/ {
            # Access control (Phase 7) — the monitor surfaces are unauthenticated
            # otherwise. htpasswd lives in the mounted secrets dir, never in git.
            auth_basic           "Neemba Monitor";
            auth_basic_user_file /var/lib/neemba/secrets/monitor.htpasswd;

            set $python_upstream python:8000;
            proxy_pass http://$python_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 30s;
        }

        # Monitor static page (Phase 6) — vanilla HTML/CSS/JS, no build step.
        location /monitor {
            # Access control (Phase 7). Loading this page issues the Basic Auth
            # challenge; the browser then caches the credential for the origin.
            auth_basic           "Neemba Monitor";
            auth_basic_user_file /var/lib/neemba/secrets/monitor.htpasswd;

            root /var/www/html;
            try_files $uri $uri/ /monitor/index.html;
        }

        # API → node
        location /api/ {
            set $node_upstream node:3000;
            proxy_pass http://$node_upstream;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 5s;
            proxy_send_timeout 60s;
            proxy_read_timeout 30s;
        }

        # Monitor live WebSocket → python (Phase 7 access control).
        # More-specific prefix than /ws so nginx matches it first; only this
        # monitor socket is authenticated, the client /ws below stays open.
        # The browser forwards the cached same-origin Basic credential (set when
        # /monitor was loaded) on this handshake, so no front-end change is
        # needed. See docs/monitoring-plan.md §0/§7 for the rationale + fallback.
        location /ws/monitor {
            auth_basic           "Neemba Monitor";
            auth_basic_user_file /var/lib/neemba/secrets/monitor.htpasswd;

            set $python_upstream python:8000;
            proxy_pass http://$python_upstream;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_buffering off;
        }

        # WebSocket → python (client-facing, unauthenticated — no regression)
        location /ws {
            set $python_upstream python:8000;
            proxy_pass http://$python_upstream;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_read_timeout 3600s;
            proxy_send_timeout 60s;
            proxy_connect_timeout 60s;
            proxy_buffering off;
        }

        # nginx 헬스체크
        location /health {
            default_type text/plain;
            return 200 "ok\n";
        }

        # 프론트 없음 → 그냥 살아있다는 응답만
        location / {
            default_type text/plain;
            return 200 "neemba\n";
        }
    }
}
