name: neemba
networks:
  appnet:
    driver: bridge

volumes:
  nats-data:
  pg-data:

services:
  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    # Self-reload every 12h so renewed certbot certificates get picked up
    # without the docker.sock-mounted reloader sidecar (removed — it was
    # effectively host-root). Certs renew ~30 days before expiry, so a
    # worst-case 12h pickup delay is harmless.
    command: >
      sh -c '(while :; do sleep 12h; nginx -s reload && echo "[cert-reload] nginx reloaded"; done) &
            exec nginx -g "daemon off;"'
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./infra/letsencrypt:/etc/letsencrypt
      - ./infra/nginx/html:/var/www/html
      # Monitor Basic Auth htpasswd (Phase 7) — same secrets dir as node/python,
      # never committed. Create with: htpasswd -B -c monitor.htpasswd <user>
      - /var/lib/neemba/secrets:/var/lib/neemba/secrets:ro
    restart: unless-stopped
    networks:
      - appnet
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  rtmp:
    image: alfg/nginx-rtmp
    container_name: rtmp
    ports:
      - "1935:1935"
    volumes:
      - ./infra/rtmp/nginx.conf:/etc/nginx/nginx.conf.template:ro
    entrypoint: >
      sh -c "envsubst < /etc/nginx/nginx.conf.template > /etc/nginx/nginx.conf &&
            nginx -g 'daemon off;'"
    networks:
      - appnet
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot
    container_name: certbot
    volumes:
      - ./infra/letsencrypt:/etc/letsencrypt
      - ./infra/nginx/html:/var/www/html
    # Renews cert files only — nginx picks them up via its own periodic
    # reload (see the nginx service command).
    entrypoint: >
      sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/html --quiet; sleep 12h & wait $${!}; done'
    networks:
      - appnet
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  node:
    build:
      context: ./services/node
      dockerfile: Dockerfile
    container_name: node
    volumes:
      - /var/lib/neemba/secrets:/var/lib/neemba/secrets:ro
    env_file:
      - .env.prod
    expose:
      - "3000"
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:3000/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  python:
    build:
      context: ./services/python
      dockerfile: Dockerfile
      target: prod
    container_name: python
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - /var/lib/neemba/secrets:/var/lib/neemba/secrets:ro
    env_file:
      - .env.prod
    expose:
      - "8000"
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 3s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nats:
    image: nats:2.10.17-alpine
    command: ["-c", "/etc/nats/nats.conf"]
    container_name: nats
    env_file:
      - .env.prod
    expose:
      - "4222"
      # 8222 (HTTP monitoring, unauthenticated) is network-internal only:
      # the healthcheck below runs inside the container and still reaches it.
      - "8222"
    volumes:
      - nats-data:/data
      - ./infra/nats/nats.conf:/etc/nats/nats.conf:ro
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8222/varz"]
      interval: 10s
      timeout: 3s
      retries: 6
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nats-box:
    image: synadia/nats-box:latest
    container_name: nats-box
    entrypoint: ["/bin/sh", "-lc"]
    command: ["sleep infinity"]
    env_file:
      - .env.prod
    networks:
      - appnet
    depends_on:
      - nats
    restart: unless-stopped

  pg-retention:
    image: postgres:16-alpine
    container_name: pg-retention
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.prod
    volumes:
      - ./infra/postgres/retention.sh:/usr/local/bin/retention.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/retention.sh"]
    networks:
      - appnet
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  pg-backup:
    build:
      context: ./infra/postgres
      dockerfile: backup.Dockerfile
    container_name: pg-backup
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.prod
    environment:
      # Not secrets — safe to pin here. Credentials come from the EC2
      # instance profile (neemba-ec2-role) via IMDS, not from env.
      BACKUP_BUCKET: neemba-db-backups-989785488374
      AWS_DEFAULT_REGION: ap-northeast-2
    volumes:
      - ./infra/postgres/backup.sh:/usr/local/bin/backup.sh:ro
    entrypoint: ["/bin/sh", "/usr/local/bin/backup.sh"]
    networks:
      - appnet
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: postgres
    env_file:
      - .env.prod
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DATABASE}
    expose:
      - "5432"
    volumes:
      - pg-data:/var/lib/postgresql/data
    networks:
      - appnet
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DATABASE}"]
      interval: 10s
      timeout: 3s
      retries: 6
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
